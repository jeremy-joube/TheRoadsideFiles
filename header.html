    /* ========================================= */

    .roadside-counter {
      width: fit-content;
      background: #0d0d0d;

      padding: 18px;
      margin-top: 20px;

      position: relative;
      overflow: hidden;
    }
    
    .roadside-counter::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
      repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.015),
      rgba(255,255,255,0.015) 1px,
      transparent 1px,
      transparent 3px
      );
      
      pointer-events: none;
    }
    
    .counter-title {

      font-size: 11px;

      margin-bottom: 12px;
      text-align: center;
      text-transform: uppercase;
    }
    
    .counter-digits {

      gap: 5px;
      justify-content: center;
    }
